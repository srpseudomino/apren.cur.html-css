<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio: Projeto Login</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=person" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=vpn_key" />
    <link rel="shortcut icon" href="imagens/imgfavicon/favicon_login.svg" type="image/x-icon">
    <link rel="stylesheet" href="estilos/estilogerais.css" media="all">
    <link rel="stylesheet" href="estilos/estcelular.css" media="screen and (max-width: 768px)">
    <link rel="stylesheet" href="estilos/esttablet.css" media="screen and (min-width: 768px) and (max-width: 992px)">
    <link rel="stylesheet" href="estilos/estpcemais.css" media="screen and (min-width: 992px)">
</head>
<body>
    <main>
        <section id="logar">
            <div id="imagem">
                <!--Espaço para imagem de login-->
            </div>
            <div id="formulario">
                <h1>Login</h1>
                <p>Seja bem-vindo(a).Faça Login para acessar sua conta e poder fazer as configurações no seu ambiente.</p>
                <form action="login.php" method="post" autocomplete="on">
                    <div class="informacoes">
                        <label for="euser">
                            <span class="material-symbols-outlined">
                                &#xe7fd;
                            </span>
                        </label>
                        <input type="email" name="emailuser" id="euser" placeholder="*************@email.com" required>
                    </div>
                    <div class="informacoes">
                        <label for="codigit">
                            <span class="material-symbols-outlined">
                                vpn_key
                            </span>
                        </label>
                        <input type="password" name="senha" id="codigit" placeholder="Senha(min. de 8 digitos)."required minlength="8">
                    </div>
                    <input type="submit" value="Entrar">
                    <a href="pags/esqueceu.html" target="_self" rel="next">
                        <p>
                            Esqueci a senha
                        <img src="imagens/mail_v3.svg" alt="mail">
                        </p>
                    </a>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
